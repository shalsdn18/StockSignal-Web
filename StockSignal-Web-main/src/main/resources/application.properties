# ===========================
# Application
# ===========================
spring.application.name=StockSignal-Web
server.port=8080

# ===========================
# H2 In-Memory Database
# ===========================
spring.datasource.url=jdbc:h2:mem:stocksignaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Telegram Bot (optional)
# Set these to enable live Telegram notifications.
# Leave blank to run without Telegram.
# ===========================
telegram.bot.token=
telegram.bot.chat-id=
