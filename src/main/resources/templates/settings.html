<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>설정 - StockSignal Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" th:href="@{/}">📈 StockSignal 시스템</a>
    <div class="navbar-nav">
        <a class="nav-item nav-link" th:href="@{/}">대시보드</a>
        <a class="nav-item nav-link active" th:href="@{/settings}">설정</a>
    </div>
</nav>
<div class="container mt-5" style="max-width: 800px;">
    <h2 class="mb-4 text-secondary">⚙️ 인프라 통합 자격 증명 설정</h2>
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        <strong>성공:</strong> API 연결 설정이 데이터베이스에 실시간 영구 적재되었습니다.
    </div>
    <form th:action="@{/settings/save}" th:object="${config}" method="post" class="shadow-sm p-4 bg-white rounded">
        <h5 class="text-primary mb-3">✈️ Telegram Notification API</h5>
        <div class="form-group">
            <label>Telegram Bot Token</label>
            <input type="password" th:field="*{telegramBotToken}" class="form-control" placeholder="bot123456789:ABC...">
        </div>
        <div class="form-group mb-4">
            <label>Telegram Chat ID</label>
            <input type="text" th:field="*{telegramChatId}" class="form-control" placeholder="-100xxxxxxxxx">
        </div>
        <h5 class="text-info mb-3">📊 토스증권 OpenAPI Credentials</h5>
        <div class="form-group">
            <label>Toss Client ID</label>
            <input type="text" th:field="*{tossClientId}" class="form-control">
        </div>
        <div class="form-group">
            <label>Toss Client Secret</label>
            <input type="password" th:field="*{tossClientSecret}" class="form-control">
        </div>
        <div class="form-group mb-4">
            <label>X-Tossinvest-Account (계좌 식별 순번)</label>
            <input type="text" th:field="*{tossAccountSeq}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">💾 통합 키셋 저장 및 동적 가동</button>
    </form>
</div>
</body>
</html>
