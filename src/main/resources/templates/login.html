<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockSignal - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<main class="auth-shell">
    <section class="auth-card auth-card--login">
        <div class="auth-brand">
            <span class="brand-mark">SS</span>
            <div>
                <p class="auth-kicker">Account Access</p>
                <h1>Sign in</h1>
            </div>
        </div>

        <p class="auth-copy">Run signal ops with a secure account session.</p>

        <div th:if="${param.error}" class="auth-alert auth-alert--error">
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <label class="auth-field">
                <span>Username</span>
                <input type="text" name="username" autocomplete="username" required maxlength="50"/>
            </label>

            <label class="auth-field">
                <span>Password</span>
                <input type="password" name="password" autocomplete="current-password" required maxlength="100"/>
            </label>

            <button type="submit" class="auth-button">Login</button>
        </form>

        <p class="auth-footer-copy">
            Don't have an account?
            <a th:href="@{/register}">Create one</a>
        </p>
    </section>
</main>
</body>
</html>
