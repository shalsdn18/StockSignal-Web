<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockSignal - Register</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="auth-body">
<main class="auth-shell auth-shell--wide">
    <section class="auth-card auth-card--register">
        <div class="auth-brand">
            <span class="brand-mark">SS</span>
            <div>
                <p class="auth-kicker">Create Account</p>
                <h1>Register</h1>
            </div>
        </div>

        <p class="auth-copy">Bind your profile to stock alerts and Telegram delivery.</p>

        <form th:action="@{/register}" method="POST" class="auth-form auth-form--grid">
            <label class="auth-field">
                <span>Username</span>
                <input type="text" name="username" id="username" maxlength="50" required/>
            </label>

            <label class="auth-field">
                <span>Password</span>
                <input type="password" name="password" id="password" maxlength="100" required/>
                <small class="auth-help">Store a BCrypt hash value up to 100 characters.</small>
            </label>

            <label class="auth-field">
                <span>Email</span>
                <input type="email" name="email" id="email" maxlength="100"/>
            </label>

            <label class="auth-field">
                <span>Telegram Chat ID</span>
                <input type="text" name="telegramChatId" id="telegramChatId" maxlength="50"/>
            </label>

            <label class="auth-field auth-field--full">
                <span>Telegram Bot Token</span>
                <input type="text" name="telegramBotToken" id="telegramBotToken" maxlength="100"/>
            </label>

            <button type="submit" class="auth-button auth-button--wide">Create account</button>
        </form>

        <p class="auth-footer-copy">
            Already have an account?
            <a href="/login">Sign in</a>
        </p>
    </section>
</main>
</body>
</html>
