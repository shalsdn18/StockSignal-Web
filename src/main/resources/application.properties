# ===========================
# Application
# ===========================
spring.application.name=StockSignal-Web
server.port=8080

# ===========================
# H2 File-Based Database (물리 스토리지 보존 + 혼합 서버 모드)
# ===========================
spring.datasource.url=jdbc:h2:file:./data/stocksignaldb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Telegram Bot Default properties
# ===========================
telegram.bot.token=
telegram.bot.chat-id=
