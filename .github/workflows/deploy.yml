name: Deploy Marp slides to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Marp slide
        # presentation.md가 docs/ 폴더에 있어 경로를 명시합니다.
        uses: docker://marpteam/marp-cli:v3.4.0
        with:
          args: docs/presentation.md -o index.html
        env:
          MARP_USER: root:root

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4